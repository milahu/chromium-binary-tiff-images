<!DOCTYPE html>

<html>

<head><meta charset="utf-8"></head>

<body>

<img title="img/test.png" src="img/test.png">

<!--

-->

<!-- this should work -->
<img title="img/test.group4.tiff" src="img/test.group4.tiff">

<!-- this should fail with: Only 1-bit supported -->

<!-- NOTE this breaks on file URLs
  but decodeTiffToBMP does not work on file URLs anyway
  https://stackoverflow.com/questions/61052684/how-to-load-a-wasm-module-locally
-->
<script src="build-wasm/group4-polyfill.js"></script>

<script type="module">

// FIXME lazy-load the module in replaceTiffImages
// only when TIFF images were found
const group4_polyfill = await create_group4_polyfill_module();

// const tiff_to_bmp = group4_polyfill.cwrap(
//   "tiff_to_bmp",
//   "number",
//   ["number", "number", "number", "number"]
// );
const tiff_to_bmp = group4_polyfill._tiff_to_bmp;

// const tiff_free = group4_polyfill.cwrap("tiff_free", null, ["number"]);
const tiff_free = group4_polyfill._tiff_free;

async function decodeTiffToBMP(url) {
  // WONTFIX this will never work over the file protocol
  // Access to fetch at 'file:...' from origin 'null' has been blocked by CORS policy
  const res = await fetch(url);
  const buf = await res.arrayBuffer();

  const inputPtr = group4_polyfill._malloc(buf.byteLength);
  group4_polyfill.HEAPU8.set(new Uint8Array(buf), inputPtr);

  const outSizePtr = group4_polyfill._malloc(4);

  const outPtr = tiff_to_bmp(
    inputPtr,
    buf.byteLength,
    outSizePtr,
    1 // 1-bit BMP
  );

  if (!outPtr) {
    // throw new Error("TIFF decode failed");
    return;
  }

  const outSize = group4_polyfill.HEAPU32[outSizePtr >> 2];

  const bmp = group4_polyfill.HEAPU8.slice(outPtr, outPtr + outSize);

  tiff_free(outPtr);
  group4_polyfill._free(inputPtr);
  group4_polyfill._free(outSizePtr);

  return bmp;
}

async function replaceTiffImages() {
  const images = document.querySelectorAll("img");

  for (const img of images) {
    if (!img.src.endsWith(".tiff") && !img.src.endsWith(".tif")) continue;

    try {
      const bmpData = await decodeTiffToBMP(img.src);

      const blob = new Blob([bmpData], { type: "image/bmp" });
      const url = URL.createObjectURL(blob);

      img.src = url;
    } catch (e) {
      // TIFF decode failed: Only 1-bit supported
      console.error(`TIFF decode failed: ${e.message} @ ${img.src}`);
    }
  }
}

replaceTiffImages();

</script>

</body>
</html>
